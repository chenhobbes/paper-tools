/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── TOKENS ── */
:root {
  --cream:      #f7f4ee;
  --cream-mid:  #ede9e1;
  --cream-deep: #e2ddd4;
  --border:     #d4cfc6;
  --ink:        #2a2720;
  --ink-mid:    #6b6560;
  --ink-light:  #a09890;
  --amber:      #FF6F45;
  --amber-pale: #f0e4d0;
  --blue:       #4f85b8;
  --blue-pale:  #dceaf5;
  --dot-color:  #d8d5ce;

  --font-serif: 'Lora', Georgia, serif;
  --font-mono:  'Inter', sans-serif;
  --font-stamp: 'WakuWaku', 'Noto Sans SC', 'Inter', sans-serif;
  --font-hand:  'Caveat', cursive;

  --nav-w:    56px;
  --panel-w:  300px;
}

body {
  font-family: var(--font-mono);
  background: var(--cream);
  color: var(--ink);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ── LEFT NAV ── */
.nav {
  width: var(--nav-w);
  background: var(--cream-mid);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0;
  gap: 4px;
  z-index: 10;
  flex-shrink: 0;
}

.nav-logo-mark {
  margin-bottom: 4px;
  cursor: default;
}

.nav-divider {
  width: 24px;
  height: 1px;
  background: var(--border);
  margin: 6px 0;
}

.nav-item {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  transition: background 0.15s;
}
.nav-item:hover { background: var(--cream-deep); }
.nav-item.active { background: var(--cream-deep); }
.nav-item.active::after {
  content: '';
  position: absolute;
  right: -1px;
  top: 50%;
  transform: translateY(-50%);
  width: 2px;
  height: 20px;
  background: var(--amber);
  border-radius: 1px 0 0 1px;
}

/* tooltips */
.nav-item::before {
  content: attr(data-tip);
  position: absolute;
  left: calc(100% + 10px);
  top: 50%;
  transform: translateY(-50%);
  background: var(--ink);
  color: var(--cream);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  padding: 4px 8px;
  border-radius: 4px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 100;
}
.nav-item:hover::before { opacity: 1; }

.nav-spacer { flex: 1; }

/* ── FOLDER ICONS ── */
.folder-icon svg { display: block; }

/* ── MIDDLE PANEL ── */
.panel {
  width: var(--panel-w);
  background: var(--cream);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

.panel-header {
  padding: 20px 20px 0;
  border-bottom: 1px solid var(--border);
  padding-bottom: 14px;
}
.panel-header h2 {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
}
.panel-header p {
  font-size: 10px;
  color: var(--ink-light);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 3px;
}

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* section */
.sec { margin-bottom: 22px; }
.sec-label {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sec-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* field */
.field { margin-bottom: 10px; }
.field label {
  display: block;
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 5px;
}
.field input[type="text"],
.field input[type="number"],
.field select {
  width: 100%;
  background: var(--cream-mid);
  border: 1px solid var(--border);
  color: var(--ink);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 7px 10px;
  border-radius: 4px;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
  appearance: none;
}
.field input:focus, .field select:focus {
  border-color: var(--amber);
  background: #fff;
}

/* range */
.range-row { display: flex; align-items: center; gap: 10px; }
.range-row input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  outline: none;
  cursor: pointer;
}
.range-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 13px; height: 13px;
  border-radius: 50%;
  background: var(--amber);
  cursor: pointer;
  border: 2px solid var(--cream);
  box-shadow: 0 0 0 1px var(--amber);
}
.range-val {
  font-size: 10px;
  color: var(--amber);
  min-width: 28px;
  text-align: right;
}

/* toggle */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.toggle-row label:first-child {
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-mid);
}
.toggle {
  position: relative;
  width: 32px; height: 18px;
  flex-shrink: 0;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-track {
  position: absolute;
  inset: 0;
  background: var(--border);
  border-radius: 18px;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle-track::after {
  content: '';
  position: absolute;
  left: 3px; top: 3px;
  width: 12px; height: 12px;
  background: white;
  border-radius: 50%;
  transition: transform 0.2s;
  box-shadow: 0 1px 2px rgba(0,0,0,0.15);
}
.toggle input:checked + .toggle-track { background: var(--amber); }
.toggle input:checked + .toggle-track::after { transform: translateX(14px); }

/* upload */
.upload-zone {
  border: 1.5px dashed var(--border);
  border-radius: 6px;
  padding: 18px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.upload-zone:hover { border-color: var(--amber); background: var(--amber-pale); }
.upload-zone input { display: none; }
.upload-zone .uicon {
  font-size: 20px;
  color: var(--ink-light);
  line-height: 1;
}
.upload-zone .ulabel {
  font-size: 11px;
  color: var(--ink-mid);
}
.upload-zone .uhint {
  font-size: 9px;
  color: var(--ink-light);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* denom row */
.denom-row { display: flex; gap: 6px; }
.denom-row select {
  width: 82px;
  flex-shrink: 0;
  font-size: 11px;
}
.denom-row input { flex: 1; min-width: 0; }

/* colour picker */
.color-trigger {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  padding: 6px 10px;
  background: var(--cream-mid);
  border: 1px solid var(--border);
  border-radius: 4px;
  transition: border-color 0.15s;
  width: 100%;
}
.color-trigger:hover { border-color: var(--amber); }
.color-preview {
  width: 20px; height: 20px;
  border-radius: 3px;
  border: 1px solid rgba(0,0,0,0.12);
  flex-shrink: 0;
}
.color-trigger .ctlabel {
  font-size: 11px;
  color: var(--ink);
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  flex: 1;
}
.color-trigger .cedit {
  font-size: 9px;
  color: var(--amber);
  font-family: var(--font-mono);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* colour popup */
.color-popup {
  position: fixed;
  z-index: 200;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  width: 222px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.13);
  display: none;
}
.color-popup.open { display: block; }
.pal-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 6px;
  margin-bottom: 10px;
}
.pal-sw {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 4px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.1s, border-color 0.12s;
  box-sizing: border-box;
  display: block;
}
.pal-sw:hover { transform: scale(1.08); }
.pal-sw.active { border-color: var(--amber); }
.hex-row {
  display: flex;
  gap: 6px;
  align-items: center;
  align-items: center;
}
.hex-hash { font-size: 12px; color: var(--ink-light); font-family: var(--font-mono); }
.hex-input {
  flex: 1;
  min-width: 0;
  background: var(--cream-mid);
  border: 1px solid var(--border);
  color: var(--ink);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 5px 6px;
  border-radius: 3px;
  outline: none;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  width: 0;
}
.hex-input:focus { border-color: var(--amber); }
.hex-apply {
  background: var(--amber);
  color: white;
  border: none;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding: 5px 9px;
  border-radius: 3px;
  cursor: pointer;
  letter-spacing: 0.04em;
}

/* action buttons */
.btn {
  width: 100%;
  padding: 10px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  border: none;
  font-weight: 500;
}
.btn:hover { opacity: 0.85; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-primary { background: var(--ink); color: var(--cream); }
.btn-secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--ink-mid);
  margin-top: 6px;
}

/* ── CANVAS AREA ── */
.canvas-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  background-color: #f0ede6;
  background-image: radial-gradient(circle, var(--dot-color) 1px, transparent 1px);
  background-size: 20px 20px;
}

.canvas-label {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-light);
  display: flex;
  align-items: center;
  gap: 8px;
}
.canvas-label::before,
.canvas-label::after {
  content: '';
  width: 32px;
  height: 1px;
  background: var(--border);
}

/* ── STAMP ── */
#stamp-wrapper {
  position: relative;
  display: inline-block;
  filter: drop-shadow(0 12px 40px rgba(42,39,32,0.18)) drop-shadow(0 2px 8px rgba(42,39,32,0.1));
  transition: filter 0.2s;
}
#stamp {
  position: relative;
  overflow: hidden;
}
.stamp-top {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  z-index: 10;
}
.stamp-country, .stamp-year {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.stamp-image-area {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.stamp-image-area img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: none;
}
.stamp-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%; height: 100%;
  cursor: pointer;
  opacity: 0.35;
  font-size: 11px;
  font-family: var(--font-mono);
  letter-spacing: 0.06em;
  color: var(--ink);
}
.stamp-placeholder .picon { font-size: 28px; }
.stamp-bottom {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 8px;
  z-index: 10;
}
.stamp-title {
  font-family: var(--font-stamp) !important;
  font-weight: normal;
  line-height: 1.1;
  max-width: 60%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.stamp-denom {
  font-family: var(--font-stamp) !important;
  font-weight: normal;
  text-align: right;
  line-height: 1.1;
}
.stamp-country, .stamp-year, .stamp-subtitle {
  font-family: 'Inter', sans-serif !important;
}
.stamp-subtitle {
  font-family: 'Inter', sans-serif !important;
  font-size: 9px;
  letter-spacing: 0.04em;
  opacity: 0.65;
  flex: 1;
  text-align: center;
  line-height: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding: 0 4px;
}

/* ── TOOL PANES ── */
.tool-pane { display: none; }
.tool-pane.active { display: flex; flex-direction: column; height: 100%; }

/* ── ID CARD PLACEHOLDER ── */
.coming-soon {
  flex: 1;

  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--ink-light);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 40px;
  text-align: center;
}
.coming-soon .cs-icon { font-size: 36px; opacity: 0.3; margin-bottom: 6px; }
.coming-soon p {

}

#export-canvas { display: none; }

/* double stamp divider line */
.stamp-divider {

  pointer-events: none;
}
/* perforation divider line — sits as sibling of #stamp inside stamp-wrapper */
.divider-line {
  position: absolute;
  pointer-events: none;
  display: none;
  z-index: 30;
  overflow: visible;
}
.divider-line.active { display: block; }
</style>

// TOOL SWITCHER

function switchTool(tool) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  document.querySelector(`[data-tool="${tool}"]`).classList.add('active');
  document.querySelectorAll('.tool-pane').forEach(p => p.classList.remove('active'));
  document.getElementById(`pane-${tool}`).classList.add('active');
  document.getElementById('stamp-canvas-area').style.display  = tool === 'stamp'  ? 'block' : 'none';
  document.getElementById('idcard-canvas-area').style.display = tool === 'idcard' ? 'flex'  : 'none';
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const state = {
  bgColor:      '#faf8f3',
  textColor:    '#1a1a1a',
  orientation:  'portrait',
  titleSize:    28,
  denomSize:    22,
  perf:         10,
  imgSrc:       null,
  whiteBorder:  false,
  borderSize:   12,
  double:       false,
};

const DIMS = {
  portrait:  { w: 280, h: 360 },
  landscape: { w: 380, h: 270 },
  square:    { w: 300, h: 300 },
};

// ─────────────────────────────────────────────
// ELEMENTS
// ─────────────────────────────────────────────
const stamp       = document.getElementById('stamp');
const dispTitle   = document.getElementById('disp-title');
const dispCountry = document.getElementById('disp-country');
const dispYear    = document.getElementById('disp-year');
const dispDenom   = document.getElementById('disp-denom');
const dispSub     = document.getElementById('disp-subtitle');
const stampImg    = document.getElementById('stamp-img');
const placeholder = document.getElementById('img-placeholder');
const stampTopEl  = document.getElementById('stamp-top-el');
const stampBotEl  = document.getElementById('stamp-bottom-el');

// ─────────────────────────────────────────────
// PERFORATION MASK
// ─────────────────────────────────────────────
function buildMask(w, h, r) {
  const rr = r / 2;
  const nx = Math.floor(w / (r * 2));
  const ny = Math.floor(h / (r * 2));
  let circles = '';
  for (let i = 0; i <= nx; i++) {
    const x = (w / nx) * i;
    circles += `<circle cx='${x}' cy='0' r='${rr}'/><circle cx='${x}' cy='${h}' r='${rr}'/>`;
  }
  for (let i = 0; i <= ny; i++) {
    const y = (h / ny) * i;
    circles += `<circle cx='0' cy='${y}' r='${rr}'/><circle cx='${w}' cy='${y}' r='${rr}'/>`;
  }
  return `url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='${w}' height='${h}'><defs><mask id='m'><rect width='${w}' height='${h}' fill='white'/>${circles}</mask></defs><rect width='${w}' height='${h}' fill='white' mask='url(%23m)'/></svg>")`;
}

// ─────────────────────────────────────────────
// APPLY STAMP
// ─────────────────────────────────────────────
function applyStamp() {
  const dim = DIMS[state.orientation];
  const w = dim.w, h = dim.h;

  stamp.style.width     = w + 'px';
  stamp.style.height    = h + 'px';
  stamp.style.background = state.bgColor;

  const mask = buildMask(w, h, state.perf);
  stamp.style.webkitMaskImage = mask;
  stamp.style.maskImage       = mask;
  stamp.style.webkitMaskRepeat = 'no-repeat';
  stamp.style.maskRepeat       = 'no-repeat';

  // stamp border — colour matches stamp background
  const imgArea = document.querySelector('.stamp-image-area');
  if (state.whiteBorder && state.imgSrc) {
    const bs = state.borderSize + 'px';
    stampImg.style.position = 'absolute';
    stampImg.style.top      = bs;
    stampImg.style.left     = bs;
    stampImg.style.right    = bs;
    stampImg.style.bottom   = bs;
    stampImg.style.width    = `calc(100% - ${state.borderSize*2}px)`;
    stampImg.style.height   = `calc(100% - ${state.borderSize*2}px)`;
    imgArea.style.background = state.bgColor;
  } else {
    stampImg.style.position = 'absolute';
    stampImg.style.top = '0'; stampImg.style.left = '0';
    stampImg.style.right = '0'; stampImg.style.bottom = '0';
    stampImg.style.width = '100%'; stampImg.style.height = '100%';
    imgArea.style.background = 'none';
  }

  // text colours
  [dispTitle, dispCountry, dispYear, dispDenom, dispSub].forEach(el => {
    el.style.color = state.textColor;
  });

  dispTitle.style.fontSize = state.titleSize + 'px';
  dispDenom.style.fontSize = state.denomSize + 'px';

  const metaSize = Math.max(7, Math.round(w * 0.032)) + 'px';
  dispCountry.style.fontSize = metaSize;
  dispYear.style.fontSize    = metaSize;
  dispSub.style.fontSize     = Math.max(6, Math.round(w * 0.026)) + 'px';

  // text inset: 8px snap + border thickness when on
  const SNAP  = 10;
  const inset = (state.whiteBorder && state.imgSrc ? state.borderSize : 0) + SNAP;
  const px    = inset + 'px';

  stampTopEl.style.top    = px;
  stampTopEl.style.left   = px;
  stampTopEl.style.right  = px;
  stampTopEl.style.padding = '0';

  stampBotEl.style.bottom = px;
  stampBotEl.style.left   = px;
  stampBotEl.style.right  = px;
  stampBotEl.style.padding = '0';

  // subtitle is in-flow inside stamp-bottom, no absolute positioning needed

  // ── DOUBLE STAMP ──
  // Same stamp size — just adds a perforation line across the middle.
  // portrait/square → horizontal split; landscape → vertical split.
  const isHoriz = state.orientation !== 'landscape';
  const dl = document.getElementById('divider-line');

  if (state.double) {
    // Draw perforation circles on a canvas overlay (unaffected by stamp mask)
    const r2    = state.perf / 2;
    const dpi   = window.devicePixelRatio || 1;

    // Match buildMask spacing exactly.
    // Skip i=0 and i=count — those positions are the outer edge holes already.
    const nx = Math.floor(w / (state.perf * 2));
    const ny = Math.floor(h / (state.perf * 2));

    function drawCircle(dc, cx, cy) {
      dc.beginPath();
      dc.arc(cx, cy, r2, 0, Math.PI * 2);
      dc.fillStyle   = '#ede9e1';
      dc.fill();
      dc.strokeStyle = '#c8c2b8';
      dc.lineWidth   = 0.8;
      dc.stroke();
    }

    if (isHoriz) {
      const cw = w, ch = state.perf * 2;
      dl.width  = Math.round(cw * dpi);
      dl.height = Math.round(ch * dpi);
      dl.style.width  = cw + 'px';
      dl.style.height = ch + 'px';
      dl.style.left   = '0';
      dl.style.top    = (h / 2 - state.perf) + 'px';
      dl.style.display = 'block';
      const dc = dl.getContext('2d');
      dc.clearRect(0, 0, dl.width, dl.height);
      dc.scale(dpi, dpi);
      // i=1 to nx-1: skip the two outermost positions (they sit on stamp edge)
      for (let i = 1; i < nx; i++) {
        drawCircle(dc, (w / nx) * i, state.perf);
      }
    } else {
      const cw = state.perf * 2, ch = h;
      dl.width  = Math.round(cw * dpi);
      dl.height = Math.round(ch * dpi);
      dl.style.width  = cw + 'px';
      dl.style.height = ch + 'px';
      dl.style.top    = '0';
      dl.style.left   = (w / 2 - state.perf) + 'px';
      dl.style.display = 'block';
      const dc = dl.getContext('2d');
      dc.clearRect(0, 0, dl.width, dl.height);
      dc.scale(dpi, dpi);
      // i=1 to ny-1: skip the two outermost positions
      for (let i = 1; i < ny; i++) {
        drawCircle(dc, state.perf, (h / ny) * i);
      }
    }
  } else {
    dl.style.display = 'none';
    // restore normal positions
    stampBotEl.style.bottom = px;
  }
}

// ─────────────────────────────────────────────

  applyStamp();

// ─────────────────────────────────────────────
// COLOUR PICKER
// Quick swatches + hex input + native color picker
// ─────────────────────────────────────────────
const QUICK_COLORS = [
  '#ffffff', // white
  '#f7f4ee', // warm white
  '#f0e6d3', // beige
  '#d4c9b8', // taupe
  '#8a8078', // warm mid
  '#4a4540', // dark warm
  '#2a2720', // near black
  '#000000', // black
];

let pickerTarget = 'bg';

function openPicker(target) {
  pickerTarget = target;
  const popup   = document.getElementById('color-popup');
  const trigger = document.getElementById(target + '-trigger');
  const rect    = trigger.getBoundingClientRect();
  // position popup — keep it on screen
  const popupW = 224;
  let left = rect.left;
  if (left + popupW > window.innerWidth - 8) left = window.innerWidth - popupW - 8;
  popup.style.top  = (rect.bottom + 6) + 'px';
  popup.style.left = left + 'px';
  // sync hex input and native picker
  const cur = target === 'bg' ? state.bgColor : state.textColor;
  document.getElementById('hex-input').value = cur.replace('#', '');
  document.getElementById('native-color-picker').value = cur.length === 7 ? cur : '#ffffff';
  renderSwatches();
  popup.classList.add('open');
}

function renderSwatches() {
  const grid = document.getElementById('pal-grid');
  const cur  = (pickerTarget === 'bg' ? state.bgColor : state.textColor).toLowerCase();
  grid.innerHTML = QUICK_COLORS.map(c =>
    `<div class="pal-sw ${c.toLowerCase() === cur ? 'active' : ''}"
      style="background:${c};${c==='#ffffff'?'border:1px solid #ddd;':''}"
      onclick="pickColor('${c}')"></div>`
  ).join('');
}

function pickColor(hex) {
  applyColor(hex);
  document.getElementById('hex-input').value = hex.replace('#', '');
  try { document.getElementById('native-color-picker').value = hex; } catch(e) {}
  renderSwatches();
}

function applyColor(hex) {
  // normalise to lowercase 6-char hex
  const h = hex.toLowerCase().startsWith('#') ? hex : '#' + hex;
  if (pickerTarget === 'bg') {
    state.bgColor = h;
    document.getElementById('bg-preview').style.background = h;
    document.getElementById('bg-hex-label').textContent = h.toUpperCase();
  } else {
    state.textColor = h;
    document.getElementById('text-preview').style.background = h;
    document.getElementById('text-hex-label').textContent = h.toUpperCase();
  }
  // force stamp background update directly too
  const stampEl = document.getElementById('stamp');
  if (stampEl && pickerTarget === 'bg') stampEl.style.background = h;
  applyStamp();
}

function applyHex() {
  const raw = document.getElementById('hex-input').value.replace('#', '');
  if (/^[0-9a-fA-F]{6}$/.test(raw)) pickColor('#' + raw);
}

document.getElementById('hex-input').addEventListener('keydown', e => { if (e.key === 'Enter') applyHex(); });

// Native color picker — fires on every change
document.getElementById('native-color-picker').addEventListener('input', e => {
  pickColor(e.target.value);
});

document.addEventListener('click', e => {
  const popup = document.getElementById('color-popup');
  if (!popup.contains(e.target) && !e.target.closest('.color-trigger')) popup.classList.remove('open');
});

// ─────────────────────────────────────────────
// EXPORT
// Renders to an offscreen canvas using the same SVG mask as the preview
// (razor-sharp perforations), cover-fits the image, no top gradient.
// ─────────────────────────────────────────────

// Cover-fit: draw image centred and cropped to fill (w x h), no stretch
function drawImageCover(ctx, img, x, y, w, h) {
  const iw = img.naturalWidth  || img.width;
  const ih = img.naturalHeight || img.height;
  const scale = Math.max(w / iw, h / ih);
  const sw = iw * scale, sh = ih * scale;
  const ox = x + (w - sw) / 2;
  const oy = y + (h - sh) / 2;
  ctx.drawImage(img, ox, oy, sw, sh);
}

async function renderToCanvas() {
  const dim   = DIMS[state.orientation];
  const scale = 3; // 3x for crisp output
  const isHoriz = state.orientation !== 'landscape';
  const lw = dim.w, lh = dim.h; // same size always
  const pw = lw * scale, ph = lh * scale;

  const canvas = document.getElementById('export-canvas');
  canvas.width  = pw;
  canvas.height = ph;
  const ctx = canvas.getContext('2d');

  // ── 1. BUILD SVG MASK IMAGE (same logic as buildMask, but as an Image) ──
  // We draw the stamp content first, then use the SVG mask to punch holes.
  const r  = state.perf / 2;
  const nx = Math.floor(lw / (state.perf * 2));
  const ny = Math.floor(lh / (state.perf * 2));

  let circles = '';
  for (let i = 0; i <= nx; i++) {
    const x = (lw / nx) * i;
    circles += `<circle cx="${x}" cy="0" r="${r}"/><circle cx="${x}" cy="${lh}" r="${r}"/>`;
  }
  for (let i = 0; i <= ny; i++) {
    const y = (lh / ny) * i;
    circles += `<circle cx="0" cy="${y}" r="${r}"/><circle cx="${lw}" cy="${y}" r="${r}"/>`;
  }
  // centre divider perforations — skip i=0 and i=count (those are outer edge holes)
  if (state.double) {
    if (isHoriz) {
      for (let i = 1; i < nx; i++) {
        const x = (lw / nx) * i;
        circles += `<circle cx="${x}" cy="${lh/2}" r="${r}"/>`;
      }
    } else {
      for (let i = 1; i < ny; i++) {
        const y = (lh / ny) * i;
        circles += `<circle cx="${lw/2}" cy="${y}" r="${r}"/>`;
      }
    }
  }

  // SVG mask image at 3x physical size for sharp edges
  const maskSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="${pw}" height="${ph}">
    <defs>
      <mask id="m">
        <rect width="${pw}" height="${ph}" fill="white"/>
        ${circles.replace(/cx="([^"]+)"/g, (_, v) => `cx="${parseFloat(v)*scale}"`)
                 .replace(/cy="([^"]+)"/g, (_, v) => `cy="${parseFloat(v)*scale}"`)
                 .replace(/r="([^"]+)"/g,  (_, v) => `r="${parseFloat(v)*scale}"`)}
      </mask>
    </defs>
    <rect width="${pw}" height="${ph}" fill="white" mask="url(#m)"/>
  </svg>`;

  const maskImg = await new Promise(res => {
    const img = new Image();
    img.onload = () => res(img);
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(maskSvg);
  });

  // ── 2. DRAW STAMP CONTENT onto a temp canvas ──
  const tmp = document.createElement('canvas');
  tmp.width = pw; tmp.height = ph;
  const tc2 = tmp.getContext('2d');
  tc2.scale(scale, scale); // draw in logical coords

  // background
  tc2.fillStyle = state.bgColor;
  tc2.fillRect(0, 0, lw, lh);

  // image
  if (state.imgSrc) {
    await new Promise(res => {
      const img = new Image();
      img.onload = () => {
        if (state.whiteBorder) {
          const bs = state.borderSize;
          tc2.fillStyle = state.bgColor;
          tc2.fillRect(0, 0, lw, lh);
          // save/restore so clip doesn't affect rest
          tc2.save();
          tc2.beginPath();
          tc2.rect(bs, bs, lw - bs*2, lh - bs*2);
          tc2.clip();
          drawImageCover(tc2, img, bs, bs, lw - bs*2, lh - bs*2);
          tc2.restore();
        } else {
          drawImageCover(tc2, img, 0, 0, lw, lh);
        }
        res();
      };
      img.onerror = () => res();
      img.src = state.imgSrc;
    });
  }

  // text — use same placeholder fallbacks as the preview
  const SNAP  = 10;
  const inset = (state.whiteBorder && state.imgSrc ? state.borderSize : 0) + SNAP;
  tc2.fillStyle = state.textColor;
  tc2.globalAlpha = 1;

  const v = id => document.getElementById(id).value;
  const countryText = v('ctrl-country') || 'Note/Note';
  const yearText    = v('ctrl-year')    || '2026-1';
  const titleText   = v('ctrl-title')   || 'N/N';
  const sym         = v('ctrl-currency');
  const denomVal    = v('ctrl-denom-val') || '5.70';
  const denomText   = sym + denomVal;
  const subText     = v('ctrl-subtitle');

  const metaSize = Math.max(7, Math.round(lw * 0.032));
  tc2.font = `${metaSize}px 'Inter', sans-serif`;
  tc2.textAlign = 'left';
  tc2.fillText(countryText, inset, inset + metaSize);
  tc2.textAlign = 'right';
  tc2.fillText(yearText, lw - inset, inset + metaSize);

  tc2.font = `normal ${state.titleSize}px WakuWaku, Inter, sans-serif`;
  tc2.textAlign = 'left';
  tc2.fillText(titleText, inset, lh - inset - state.titleSize * 0.15);

  tc2.font = `normal ${state.denomSize}px WakuWaku, Inter, sans-serif`;
  tc2.textAlign = 'right';
  tc2.fillText(denomText, lw - inset, lh - inset - state.denomSize * 0.15);

  // subtitle: centred between title and denom on same baseline
  if (subText) {
    const ss = Math.max(9, Math.round(lw * 0.032));
    tc2.font = `${ss}px 'Inter', sans-serif`;
    tc2.globalAlpha = 0.65;
    tc2.textAlign = 'center';
    tc2.fillText(subText, lw / 2, lh - inset - ss * 0.1);
    tc2.globalAlpha = 1;
  }

  // ── 3. APPLY SVG MASK to punch holes ──
  // Use the mask as a luminance mask: draw content, then multiply by mask alpha
  ctx.drawImage(tmp, 0, 0);
  ctx.globalCompositeOperation = 'destination-in';
  ctx.drawImage(maskImg, 0, 0);
  ctx.globalCompositeOperation = 'source-over';

  return canvas;
}

function showToast(msg, ok) {
  let t = document.getElementById('export-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'export-toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:5px;font-family:var(--font-mono);font-size:11px;letter-spacing:0.07em;z-index:999;transition:opacity 0.3s;pointer-events:none;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.background = ok ? 'var(--ink)' : '#c0392b';
  t.style.color = 'var(--cream)';
  t.style.opacity = '1';
  clearTimeout(t._to);
  t._to = setTimeout(() => { t.style.opacity = '0'; }, 2800);
}

document.getElementById('btn-download').addEventListener('click', async () => {
  try {
    const canvas = await renderToCanvas();
    const dataUrl = canvas.toDataURL('image/png');
    const link = document.createElement('a');
    link.download = 'stamp.png';
    link.href = dataUrl;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    showToast('stamp.png downloaded', true);
  } catch(e) {
    console.error(e);
    showToast('Export failed — see console for details', false);
  }
});


// ─────────────────────────────────────────────
// INIT — show placeholder text on stamp
// ─────────────────────────────────────────────
// Placeholder helpers — show default text when field empty, full opacity always
const PLACEHOLDERS = {
  'ctrl-title':    { el: () => dispTitle,   text: 'N/N'        },
  'ctrl-country':  { el: () => dispCountry, text: 'Note/Note'  },
  'ctrl-year':     { el: () => dispYear,    text: '2026-1'     },
  'ctrl-subtitle': { el: () => dispSub,     text: ''           },
};

function syncField(id) {
  const { el, text } = PLACEHOLDERS[id];
  const val = document.getElementById(id).value;
  el().textContent = val || text;
  el().style.opacity = '1'; // always full opacity
}

function syncDenom() {
  const sym = document.getElementById('ctrl-currency').value;
  const val = document.getElementById('ctrl-denom-val').value;
  dispDenom.textContent = sym + (val || '5.70');
  dispDenom.style.opacity = '1';
}

function initPlaceholders() {
  Object.keys(PLACEHOLDERS).forEach(syncField);
  syncDenom();
}

Object.keys(PLACEHOLDERS).forEach(id => {
  document.getElementById(id).addEventListener('input', () => syncField(id));
});
['ctrl-currency','ctrl-denom-val'].forEach(id => {
  document.getElementById(id).addEventListener('change', syncDenom);
  document.getElementById(id).addEventListener('input',  syncDenom);
});

applyStamp();
initPlaceholders();
